<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}GrievTrack{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <header class="topbar">
        <div class="brand">GrievTrack</div>
        <nav class="nav">
            <a href="{{ url_for('dashboard') }}">Dashboard</a>
            <a href="{{ url_for('submit') }}">Submit</a>
            <a href="{{ url_for('update') }}">Update</a>
            <a href="{{ url_for('timeline') }}">Timeline</a>
            <a href="{{ url_for('audit') }}">Audit</a>
            <a href="{{ url_for('benchmark') }}">Benchmark</a>
            <a href="{{ url_for('reset') }}">Reset</a>
        </nav>
    </header>
    <main class="content">
        {% block content %}{% endblock %}
    </main>
</body>
</html>
